<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スピーチ暗記ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f7f4ef;
    --accent: #c0392b;
    --muted: #7a7a8c;
    --line: #ddd8d0;
    --record: #e74c3c;
    --green: #27ae60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 2px solid var(--ink);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.3rem;
    letter-spacing: 0.05em;
    flex: 1;
  }

  .api-key-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .api-key-row input {
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 0.3rem 0.6rem;
    font-size: 0.78rem;
    width: 220px;
    background: white;
    outline: none;
  }

  .api-key-row input:focus { border-color: var(--ink); }

  .api-status {
    font-size: 0.72rem;
    padding: 0.2rem 0.5rem;
    border-radius: 10px;
    background: #eee;
    color: var(--muted);
  }

  .api-status.ready { background: #d4edda; color: #155724; }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    flex: 1;
  }

  .panel {
    padding: 1.5rem 2rem;
    border-right: 1px solid var(--line);
  }

  .panel:last-child { border-right: none; }

  .panel-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  #speech-input {
    width: 100%;
    min-height: 300px;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1rem;
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    line-height: 1.9;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  #speech-input:focus { border-color: var(--ink); }

  .char-count {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    margin-top: 0.4rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.55rem 1.1rem;
    border: none;
    border-radius: 3px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-green { background: var(--green); color: white; }
  .btn-outline { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
  .btn-small { padding: 0.3rem 0.7rem; font-size: 0.75rem; }

  .action-row {
    display: flex;
    gap: 0.6rem;
    margin-top: 0.8rem;
    flex-wrap: wrap;
    align-items: center;
  }

  /* 原稿表示 */
  #speech-display {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem;
    line-height: 2.2;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1.2rem 1.4rem;
    min-height: 300px;
    max-height: 60vh;
    overflow-y: auto;
    background: white;
  }

  .speech-line {
    padding: 3px 6px;
    border-radius: 3px;
    transition: background 0.3s;
    min-height: 1.8em;
  }

  .speech-line.done {
    background: #d4edda;
    color: #155724;
  }

  .speech-line.current {
    background: #fff3cd;
    font-weight: 500;
  }

  .script-legend {
    display: flex;
    gap: 1rem;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  .legend-done { color: #155724; }
  .legend-current { color: #856404; }

  /* 右パネル：音声認識 */
  .sr-status {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1rem;
    min-height: 1.8rem;
  }

  .sr-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .sr-dot.listening {
    background: var(--green);
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .transcript-box {
    background: white;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0.9rem 1rem;
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--ink);
    min-height: 90px;
    max-height: 160px;
    overflow-y: auto;
    margin-bottom: 0.8rem;
  }

  .transcript-interim {
    color: var(--muted);
    font-style: italic;
  }

  .progress-bar-wrap {
    background: var(--line);
    border-radius: 10px;
    height: 6px;
    margin-bottom: 0.8rem;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--green);
    border-radius: 10px;
    transition: width 0.4s;
    width: 0%;
  }

  .progress-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    margin-top: 0.2rem;
    margin-bottom: 0.8rem;
  }

  /* 録音パネル（オプション） */
  .recordings-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 0.8rem;
    max-height: 200px;
    overflow-y: auto;
  }

  .recording-item {
    background: white;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0.6rem 0.8rem;
    font-size: 0.8rem;
  }

  .recording-item-top {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.3rem;
  }

  .rec-label { flex: 1; font-weight: 500; font-size: 0.78rem; }
  .rec-dur { color: var(--muted); font-size: 0.75rem; }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0.1rem 0.3rem;
    margin-left: auto;
    transition: color 0.15s;
  }

  .del-btn:hover { color: var(--record); }

  .timer-bar {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.6rem 2rem;
    border-top: 1px solid var(--line);
    background: white;
    font-size: 0.8rem;
    color: var(--muted);
  }

  #elapsed {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.2rem;
    color: var(--ink);
    min-width: 4rem;
  }

  .speed-note { margin-left: auto; font-size: 0.73rem; }

  footer {
    text-align: center;
    padding: 0.5rem;
    font-size: 0.7rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 680px) {
    main { grid-template-columns: 1fr; }
    .panel { border-right: none; border-bottom: 1px solid var(--line); }
    .api-key-row input { width: 160px; }
  }
</style>
</head>
<body>

<header>
  <h1>スピーチ暗記ツール</h1>
  <div class="api-key-row">
    🔑
    <input type="password" id="api-key-input" placeholder="Gemini APIキー（録音分析用）" oninput="onApiKeyChange()">
    <span class="api-status" id="api-status">未設定</span>
  </div>
</header>

<main>
  <!-- LEFT: 原稿 -->
  <div class="panel">
    <div class="panel-label">スピーチ原稿</div>

    <div id="edit-area">
      <textarea id="speech-input" placeholder="ここにスピーチ原稿を入力してください…"></textarea>
      <div class="char-count"><span id="char-count">0</span> 文字</div>
      <div class="action-row">
        <button class="btn btn-primary" onclick="startPractice()">▶ 練習開始</button>
        <button class="btn btn-outline btn-small" onclick="loadSample()">サンプル</button>
      </div>
    </div>

    <div id="reading-area" style="display:none;">
      <div id="speech-display"></div>
      <div class="script-legend" id="script-legend">
        <span class="legend-done">■ 読んだ行</span>
        <span class="legend-current">■ 現在の行</span>
      </div>
      <div class="action-row">
        <button class="btn btn-outline btn-small" onclick="exitPractice()">← 編集に戻る</button>
        <button class="btn btn-outline btn-small" onclick="resetHighlights()">リセット</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: 音声認識 -->
  <div class="panel">
    <div class="panel-label">リアルタイム音声認識</div>

    <div class="sr-status">
      <div class="sr-dot" id="sr-dot"></div>
      <span id="sr-status-text">練習開始ボタンを押してください</span>
    </div>

    <div class="transcript-box" id="transcript-box">
      <span id="transcript-final"></span><span class="transcript-interim" id="transcript-interim"></span>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-label">進捗: 0 / 0 行</div>

    <div class="action-row">
      <button class="btn btn-green" id="sr-btn" onclick="toggleSpeech()" disabled>🎤 音声認識 開始</button>
      <button class="btn btn-outline btn-small" onclick="resetHighlights()">リセット</button>
    </div>

    <div style="margin-top:1.2rem; border-top:1px solid var(--line); padding-top:1rem;">
      <div class="panel-label" style="margin-bottom:0.6rem;">録音（オプション）</div>
      <div class="action-row" style="margin-top:0;">
        <button class="btn btn-accent btn-small" id="rec-btn" onclick="toggleRecording()" disabled>● 録音開始</button>
        <button class="btn btn-outline btn-small" onclick="clearRecordings()">すべて削除</button>
      </div>
      <div id="recordings-list" class="recordings-list"></div>
    </div>
  </div>
</main>

<div class="timer-bar">
  <span>練習時間</span>
  <span id="elapsed">0:00</span>
  <span class="speed-note" id="speed-note"></span>
</div>

<footer>音声認識はChrome推奨 ／ マイクへのアクセス許可が必要です</footer>

<script>
// ─── State ───
let scriptLines = [];       // 原稿の行（空行含む）
let nonEmptyLineIndices = []; // 空行でない行のインデックス
let currentLineIdx = 0;     // 現在マッチを試みている行（nonEmptyLineIndices内のインデックス）
let doneLines = new Set();  // 読み終えた行のインデックス（scriptLines基準）

// Web Speech API
let recognition = null;
let isSpeaking = false;
let accumulatedTranscript = ''; // これまでの確定テキスト全部

// 録音
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let recordings = [];
let recCount = 0;
let recStartTime = null;
let currentMimeType = '';

// タイマー
let sessionStart = Date.now();
let practiceStarted = false;

setInterval(() => {
  if (!practiceStarted) return;
  const s = Math.floor((Date.now() - sessionStart) / 1000);
  document.getElementById('elapsed').textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}, 1000);

// ─── API Key ───
function onApiKeyChange() {
  const key = document.getElementById('api-key-input').value.trim();
  const status = document.getElementById('api-status');
  if (key.startsWith('AIza') && key.length > 20) {
    status.textContent = '設定済み ✓';
    status.className = 'api-status ready';
  } else {
    status.textContent = key ? '形式を確認' : '未設定';
    status.className = 'api-status';
  }
}

// ─── Char count ───
const inputEl = document.getElementById('speech-input');
inputEl.addEventListener('input', () => {
  document.getElementById('char-count').textContent = inputEl.value.length;
});

// ─── Sample ───
function loadSample() {
  inputEl.value = `皆さん、本日はお集まりいただきありがとうございます。

私は今日、「言葉の力」についてお話ししたいと思います。

言葉は人と人をつなぐ橋です。
私たちは毎日、何百もの言葉を交わしながら生きています。

しかしその一言一言に、どれほどの重みがあるか、
立ち止まって考えることはあるでしょうか。

「ありがとう」と「ごめんなさい」。
この二つの言葉だけで、
どれほどの関係が救われてきたことでしょう。

言葉を大切に、丁寧に。
それが、より良い社会への第一歩だと私は信じています。

ご清聴ありがとうございました。`;
  document.getElementById('char-count').textContent = inputEl.value.length;
}

// ─── Practice Start/Stop ───
function startPractice() {
  const text = inputEl.value.trim();
  if (!text) { alert('原稿を入力してください。'); return; }

  // 行データを準備
  scriptLines = text.split('\n');
  nonEmptyLineIndices = scriptLines
    .map((l, i) => ({ l, i }))
    .filter(x => x.l.trim().length > 0)
    .map(x => x.i);
  currentLineIdx = 0;
  doneLines = new Set();
  accumulatedTranscript = '';

  // 原稿表示を構築
  const display = document.getElementById('speech-display');
  display.innerHTML = scriptLines.map((line, i) =>
    `<div class="speech-line" id="line-${i}">${line || '&nbsp;'}</div>`
  ).join('');

  document.getElementById('edit-area').style.display = 'none';
  document.getElementById('reading-area').style.display = 'block';

  // ボタン有効化
  document.getElementById('sr-btn').disabled = false;
  document.getElementById('rec-btn').disabled = false;
  document.getElementById('sr-status-text').textContent = '🎤 開始ボタンを押してスピーチを始めてください';

  updateProgress();
  highlightCurrentLine();

  practiceStarted = true;
  sessionStart = Date.now();
}

function exitPractice() {
  stopSpeech();
  stopRecording();
  document.getElementById('edit-area').style.display = 'block';
  document.getElementById('reading-area').style.display = 'none';
  document.getElementById('sr-btn').disabled = true;
  document.getElementById('rec-btn').disabled = true;
  document.getElementById('sr-status-text').textContent = '練習開始ボタンを押してください';
  practiceStarted = false;
}

// ─── 原稿ハイライト ───
function highlightCurrentLine() {
  // 全行のcurrentクラスをクリア
  document.querySelectorAll('.speech-line.current').forEach(el => el.classList.remove('current'));

  if (currentLineIdx >= nonEmptyLineIndices.length) return;
  const lineIdx = nonEmptyLineIndices[currentLineIdx];
  const el = document.getElementById(`line-${lineIdx}`);
  if (el) {
    el.classList.add('current');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function markLineDone(lineIdx) {
  doneLines.add(lineIdx);
  const el = document.getElementById(`line-${lineIdx}`);
  if (el) {
    el.classList.remove('current');
    el.classList.add('done');
  }
}

function resetHighlights() {
  document.querySelectorAll('.speech-line').forEach(el => {
    el.classList.remove('done', 'current');
  });
  currentLineIdx = 0;
  doneLines = new Set();
  accumulatedTranscript = '';
  document.getElementById('transcript-final').textContent = '';
  document.getElementById('transcript-interim').textContent = '';
  updateProgress();
  if (scriptLines.length > 0) highlightCurrentLine();
}

function updateProgress() {
  const total = nonEmptyLineIndices.length;
  const done = doneLines.size;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-bar').style.width = `${pct}%`;
  document.getElementById('progress-label').textContent = `進捗: ${done} / ${total} 行 (${pct}%)`;
}

// ─── テキストマッチング ───
function normalize(text) {
  return text
    .replace(/[\s　。、．，！？!?「」『』【】〔〕（）()・…‥〜～]/g, '')
    .toLowerCase();
}

// 話したテキストと原稿行を照合して進める
function matchTranscriptToScript(transcript) {
  if (currentLineIdx >= nonEmptyLineIndices.length) return;

  const normalizedTranscript = normalize(transcript);

  // 現在行から数行先まで照合を試みる（スキップ対応）
  for (let offset = 0; offset <= 2; offset++) {
    const idx = currentLineIdx + offset;
    if (idx >= nonEmptyLineIndices.length) break;

    const lineIdx = nonEmptyLineIndices[idx];
    const line = scriptLines[lineIdx];
    const normalizedLine = normalize(line);

    if (normalizedLine.length === 0) continue;

    // 原稿行の70%以上が話したテキストに含まれていれば「読んだ」と判定
    const threshold = Math.floor(normalizedLine.length * 0.7);
    let matchCount = 0;

    // 部分一致スコアを計算（原稿の各文字がtranscriptにあるか）
    // より実用的に：原稿行全体がtranscriptの末尾付近に含まれているか
    if (normalizedTranscript.includes(normalizedLine)) {
      matchCount = normalizedLine.length;
    } else {
      // 部分一致：原稿行のどれだけの割合がtranscriptにあるか
      // 最長共通部分文字列の簡易版
      for (let len = Math.min(normalizedLine.length, 4); len <= normalizedLine.length; len++) {
        for (let start = 0; start <= normalizedLine.length - len; start++) {
          const sub = normalizedLine.slice(start, start + len);
          if (normalizedTranscript.includes(sub)) {
            matchCount = Math.max(matchCount, len);
          }
        }
      }
    }

    if (matchCount >= threshold) {
      // offsetの間の行もdoneにする
      for (let k = 0; k <= offset; k++) {
        const doneIdx = nonEmptyLineIndices[currentLineIdx + k];
        markLineDone(doneIdx);
      }
      currentLineIdx = idx + 1;
      updateProgress();
      highlightCurrentLine();

      // さらに次の行とも照合（連続して読んだ場合）
      if (currentLineIdx < nonEmptyLineIndices.length) {
        matchTranscriptToScript(transcript);
      }
      return;
    }
  }
}

// ─── Web Speech API ───
function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('sr-status-text').textContent = '⚠ このブラウザは音声認識に対応していません（Chrome推奨）';
    return null;
  }

  const rec = new SpeechRecognition();
  rec.lang = 'ja-JP';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onstart = () => {
    document.getElementById('sr-dot').classList.add('listening');
    document.getElementById('sr-status-text').textContent = '🎤 認識中… 話してください';
    document.getElementById('sr-btn').textContent = '⏹ 音声認識 停止';
  };

  rec.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const result = event.results[i];
      if (result.isFinal) {
        accumulatedTranscript += result[0].transcript;
        matchTranscriptToScript(accumulatedTranscript);
      } else {
        interim += result[0].transcript;
      }
    }
    document.getElementById('transcript-final').textContent = accumulatedTranscript.slice(-120);
    document.getElementById('transcript-interim').textContent = interim;
  };

  rec.onerror = (e) => {
    if (e.error === 'no-speech') return; // 無音は無視
    document.getElementById('sr-status-text').textContent = `エラー: ${e.error}`;
  };

  rec.onend = () => {
    if (isSpeaking) {
      // 自動再起動（continuousでも環境によって止まる）
      try { rec.start(); } catch(_) {}
    } else {
      document.getElementById('sr-dot').classList.remove('listening');
      document.getElementById('sr-status-text').textContent = '音声認識を停止しました';
      document.getElementById('sr-btn').textContent = '🎤 音声認識 開始';
    }
  };

  return rec;
}

function toggleSpeech() {
  if (!isSpeaking) startSpeech();
  else stopSpeech();
}

function startSpeech() {
  if (!recognition) recognition = initRecognition();
  if (!recognition) return;
  isSpeaking = true;
  try { recognition.start(); } catch(_) {}
}

function stopSpeech() {
  isSpeaking = false;
  if (recognition) {
    try { recognition.stop(); } catch(_) {}
  }
  document.getElementById('sr-dot').classList.remove('listening');
  document.getElementById('sr-btn').textContent = '🎤 音声認識 開始';
  document.getElementById('sr-status-text').textContent = '停止しました';
}

// ─── 録音（オプション） ───
async function toggleRecording() {
  if (!isRecording) await startRecording();
  else stopRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = [
      'audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4','audio/aac'
    ].find(t => MediaRecorder.isTypeSupported(t)) || '';

    currentMimeType = mimeType;
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: currentMimeType || 'audio/webm' });
      saveRecording(blob);
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    isRecording = true;
    recStartTime = Date.now();
    document.getElementById('rec-btn').textContent = '■ 録音停止';
    document.getElementById('rec-btn').style.background = '#c0392b';
  } catch(e) {
    alert(`録音エラー: ${e.message}`);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  document.getElementById('rec-btn').textContent = '● 録音開始';
  document.getElementById('rec-btn').style.background = '';
}

function saveRecording(blob) {
  recCount++;
  const url = URL.createObjectURL(blob);
  const dur = Math.floor((Date.now() - recStartTime) / 1000);
  const timeStr = `${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
  recordings.push({ url, blob, timeStr, dur });
  renderRecordings();
}

function renderRecordings() {
  const list = document.getElementById('recordings-list');
  list.innerHTML = '';
  recordings.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'recording-item';
    div.innerHTML = `
      <div class="recording-item-top">
        <span class="rec-label">テイク ${i+1}</span>
        <span class="rec-dur">${r.timeStr}</span>
        <button class="del-btn" onclick="deleteRecording(${i})">✕</button>
      </div>
      <audio controls src="${r.url}" style="width:100%; height:28px;"></audio>
    `;
    list.appendChild(div);
  });
}

function deleteRecording(i) {
  URL.revokeObjectURL(recordings[i].url);
  recordings.splice(i, 1);
  renderRecordings();
}

function clearRecordings() {
  if (!recordings.length) return;
  if (!confirm('すべての録音を削除しますか？')) return;
  recordings.forEach(r => URL.revokeObjectURL(r.url));
  recordings = [];
  recCount = 0;
  renderRecordings();
}
</script>
</body>
</html>
