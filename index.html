<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スピーチ暗記ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f7f4ef;
    --accent: #c0392b;
    --accent-soft: #f5e6e4;
    --muted: #7a7a8c;
    --line: #ddd8d0;
    --record: #e74c3c;
    --play: #2ecc71;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 2px solid var(--ink);
    padding: 1.2rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
  }

  header span {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    flex: 1;
  }

  .panel {
    padding: 2rem;
    border-right: 1px solid var(--line);
  }

  .panel:last-child { border-right: none; }

  .panel-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* ── Left: Input ── */
  #speech-input {
    width: 100%;
    min-height: 280px;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1rem;
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    line-height: 1.9;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  #speech-input:focus { border-color: var(--ink); }

  .char-count {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    margin-top: 0.4rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 3px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--ink);
    color: var(--paper);
  }

  .btn-accent {
    background: var(--accent);
    color: white;
  }

  .btn-outline {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
  }

  .btn-small {
    padding: 0.35rem 0.8rem;
    font-size: 0.78rem;
  }

  .action-row {
    display: flex;
    gap: 0.6rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  /* ── Reading mode ── */
  #reading-area {
    display: none;
  }

  #speech-display {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem;
    line-height: 2;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1rem 1.2rem;
    min-height: 280px;
    background: white;
    white-space: pre-wrap;
  }

  .highlight-word {
    background: #fff3cd;
    border-radius: 2px;
    transition: background 0.3s;
  }

  .highlight-word.current {
    background: #ffc107;
    font-weight: 500;
  }

  /* ── Right: Recording ── */
  .recording-section { }

  .rec-status {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 1.2rem;
    min-height: 1.6rem;
  }

  .rec-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .rec-dot.recording {
    background: var(--record);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .waveform-container {
    background: white;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0.8rem;
    margin-bottom: 1rem;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas#waveform {
    width: 100%;
    height: 100%;
  }

  .recordings-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-top: 1rem;
    max-height: 300px;
    overflow-y: auto;
  }

  .recording-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.7rem 0.9rem;
    background: white;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 0.82rem;
  }

  .recording-item .rec-num {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 1.5rem;
  }

  .recording-item .rec-info {
    flex: 1;
    color: var(--muted);
  }

  .recording-item audio {
    flex: 1;
    height: 32px;
  }

  .recording-item .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.2rem;
    transition: color 0.15s;
  }

  .recording-item .del-btn:hover { color: var(--record); }

  /* ── Timer ── */
  .timer-bar {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.8rem 2rem;
    border-top: 1px solid var(--line);
    background: white;
    font-size: 0.82rem;
    color: var(--muted);
  }

  #elapsed {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem;
    color: var(--ink);
    letter-spacing: 0.05em;
    min-width: 4rem;
  }

  .speed-note {
    margin-left: auto;
    font-size: 0.75rem;
  }

  /* ── Scroll to top ── */
  footer {
    text-align: center;
    padding: 0.8rem;
    font-size: 0.72rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
  }

  /* ── Responsive ── */
  @media (max-width: 680px) {
    main { grid-template-columns: 1fr; }
    .panel { border-right: none; border-bottom: 1px solid var(--line); }
  }
</style>
</head>
<body>

<header>
  <h1>スピーチ暗記ツール</h1>
  <span>全文確認 ＋ 録音練習</span>
</header>

<main>
  <!-- LEFT: Text Panel -->
  <div class="panel">
    <div class="panel-label">スピーチ原稿</div>

    <!-- Edit mode -->
    <div id="edit-area">
      <textarea id="speech-input" placeholder="ここにスピーチ原稿を入力してください…"></textarea>
      <div class="char-count"><span id="char-count">0</span> 文字</div>
      <div class="action-row">
        <button class="btn btn-primary" onclick="startReading()">▶ 読み上げ練習を開始</button>
        <button class="btn btn-outline btn-small" onclick="loadSample()">サンプルを読み込む</button>
      </div>
    </div>

    <!-- Reading mode -->
    <div id="reading-area">
      <div id="speech-display"></div>
      <div class="action-row">
        <button class="btn btn-outline btn-small" onclick="exitReading()">← 編集に戻る</button>
        <button class="btn btn-outline btn-small" onclick="toggleHighlight()" id="hl-btn">行ハイライト ON</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Recording Panel -->
  <div class="panel recording-section">
    <div class="panel-label">録音・比較</div>

    <div class="rec-status">
      <div class="rec-dot" id="rec-dot"></div>
      <span id="rec-status-text">録音待機中</span>
    </div>

    <div class="waveform-container">
      <canvas id="waveform"></canvas>
    </div>

    <div class="action-row">
      <button class="btn btn-accent" id="rec-btn" onclick="toggleRecording()">● 録音開始</button>
      <button class="btn btn-outline btn-small" onclick="clearAll()">すべて削除</button>
    </div>

    <div id="recordings-list" class="recordings-list"></div>

    <div style="margin-top:1.2rem; font-size:0.78rem; color:var(--muted); line-height:1.7;">
      💡 録音後は左の原稿を見ながら再生して<br>発音・間・流れを確認しましょう。
    </div>
  </div>
</main>

<div class="timer-bar">
  <span>練習時間</span>
  <span id="elapsed">0:00</span>
  <span class="speed-note" id="speed-note"></span>
</div>

<footer>マイクへのアクセス許可が必要です</footer>

<script>
// ─── State ───
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let recordings = [];
let recCount = 0;

let analyser = null;
let animFrame = null;

let startTime = null;
let timerInterval = null;
let sessionStart = Date.now();
let sessionInterval = setInterval(updateSessionTimer, 1000);

let highlightEnabled = false;
let currentLine = 0;
let lines = [];

// ─── Char count ───
const input = document.getElementById('speech-input');
input.addEventListener('input', () => {
  document.getElementById('char-count').textContent = input.value.length;
});

// ─── Session timer ───
function updateSessionTimer() {
  const s = Math.floor((Date.now() - sessionStart) / 1000);
  const m = Math.floor(s / 60);
  const ss = s % 60;
  document.getElementById('elapsed').textContent = `${m}:${ss.toString().padStart(2,'0')}`;
}

// ─── Sample ───
function loadSample() {
  input.value = `皆さん、本日はお集まりいただきありがとうございます。

私は今日、「言葉の力」についてお話ししたいと思います。

言葉は人と人をつなぐ橋です。
私たちは毎日、何百もの言葉を交わしながら生きています。

しかしその一言一言に、どれほどの重みがあるか、
立ち止まって考えることはあるでしょうか。

「ありがとう」と「ごめんなさい」。
この二つの言葉だけで、
どれほどの関係が救われてきたことでしょう。

言葉を大切に、丁寧に。
それが、より良い社会への第一歩だと私は信じています。

ご清聴ありがとうございました。`;
  document.getElementById('char-count').textContent = input.value.length;
}

// ─── Reading Mode ───
function startReading() {
  const text = input.value.trim();
  if (!text) { alert('原稿を入力してください。'); return; }

  lines = text.split('\n');
  const display = document.getElementById('speech-display');
  display.innerHTML = lines.map((line, i) =>
    `<div class="speech-line" id="line-${i}" style="padding:2px 4px; border-radius:3px; cursor:pointer;" onclick="setCurrentLine(${i})">${line || '&nbsp;'}</div>`
  ).join('');

  document.getElementById('edit-area').style.display = 'none';
  document.getElementById('reading-area').style.display = 'block';
  currentLine = 0;
  if (highlightEnabled) highlightLine(0);
}

function exitReading() {
  document.getElementById('edit-area').style.display = 'block';
  document.getElementById('reading-area').style.display = 'none';
  clearHighlights();
}

function toggleHighlight() {
  highlightEnabled = !highlightEnabled;
  document.getElementById('hl-btn').textContent = highlightEnabled ? '行ハイライト OFF' : '行ハイライト ON';
  if (highlightEnabled) highlightLine(currentLine);
  else clearHighlights();
}

function clearHighlights() {
  document.querySelectorAll('.speech-line').forEach(el => el.style.background = '');
}

function highlightLine(idx) {
  clearHighlights();
  const el = document.getElementById(`line-${idx}`);
  if (el) {
    el.style.background = '#fff3cd';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function setCurrentLine(idx) {
  currentLine = idx;
  if (highlightEnabled) highlightLine(idx);
}

// ─── Recording ───
async function toggleRecording() {
  if (!isRecording) {
    await startRecording();
  } else {
    stopRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    // Analyser for waveform
    const ctx = new AudioContext();
    const source = ctx.createMediaStreamSource(stream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    drawWaveform();

    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      saveRecording(blob);
      stream.getTracks().forEach(t => t.stop());
      cancelAnimationFrame(animFrame);
      clearCanvas();
    };
    mediaRecorder.start();

    isRecording = true;
    startTime = Date.now();
    timerInterval = setInterval(updateRecTimer, 500);

    document.getElementById('rec-btn').textContent = '■ 録音停止';
    document.getElementById('rec-btn').style.background = '#c0392b';
    document.getElementById('rec-dot').classList.add('recording');
    document.getElementById('rec-status-text').textContent = '録音中…';
  } catch(e) {
    alert('マイクへのアクセスが許可されていません。ブラウザの設定を確認してください。');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  clearInterval(timerInterval);
  document.getElementById('rec-btn').textContent = '● 録音開始';
  document.getElementById('rec-btn').style.background = '';
  document.getElementById('rec-dot').classList.remove('recording');
  document.getElementById('rec-status-text').textContent = '録音待機中';
}

function updateRecTimer() {
  if (!startTime) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(s / 60);
  const ss = s % 60;
  document.getElementById('rec-status-text').textContent = `録音中… ${m}:${ss.toString().padStart(2,'0')}`;
}

function saveRecording(blob) {
  recCount++;
  const url = URL.createObjectURL(blob);
  const dur = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(dur / 60);
  const s = dur % 60;
  const label = `テイク ${recCount}`;
  const timeStr = `${m}:${s.toString().padStart(2,'0')}`;

  recordings.push({ url, label, timeStr });
  renderRecordings();

  // WPM hint
  const charLen = input.value.trim().length;
  if (charLen > 0 && dur > 0) {
    const wpm = Math.round((charLen / dur) * 60);
    document.getElementById('speed-note').textContent = `最新テイク: ${wpm} 文字/分`;
  }
}

function renderRecordings() {
  const list = document.getElementById('recordings-list');
  list.innerHTML = '';
  recordings.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'recording-item';
    div.innerHTML = `
      <span class="rec-num">${i+1}</span>
      <div style="flex:1; display:flex; flex-direction:column; gap:0.2rem;">
        <div style="font-size:0.8rem; font-weight:500;">${r.label} <span style="color:var(--muted); font-weight:400;">${r.timeStr}</span></div>
        <audio controls src="${r.url}" style="width:100%; height:28px;"></audio>
      </div>
      <button class="del-btn" onclick="deleteRecording(${i})">✕</button>
    `;
    list.appendChild(div);
  });
}

function deleteRecording(i) {
  URL.revokeObjectURL(recordings[i].url);
  recordings.splice(i, 1);
  renderRecordings();
}

function clearAll() {
  if (recordings.length === 0) return;
  if (!confirm('すべての録音を削除しますか？')) return;
  recordings.forEach(r => URL.revokeObjectURL(r.url));
  recordings = [];
  recCount = 0;
  renderRecordings();
  document.getElementById('speed-note').textContent = '';
}

// ─── Waveform ───
function drawWaveform() {
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;

  const buf = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    animFrame = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(buf);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#c0392b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const sliceW = canvas.width / buf.length;
    let x = 0;
    buf.forEach((v, i) => {
      const y = (v / 128) * (canvas.height / 2);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += sliceW;
    });
    ctx.stroke();
  }
  draw();
}

function clearCanvas() {
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>
</body>
</html>
